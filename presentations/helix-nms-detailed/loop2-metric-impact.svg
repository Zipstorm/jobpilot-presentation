<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440"
     font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="glow-teal" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#2DD4BF" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#4A90D9" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-orange" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#FB923C" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-gray" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#94a3b8" flood-opacity="0.2" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-blue" viewBox="0 0 10 7" refX="9" refY="3.5"
            markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#4A90D9"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 7" refX="9" refY="3.5"
            markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#64748b"/>
    </marker>
    <linearGradient id="grad-teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="grad-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4A90D9" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="grad-orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FB923C" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="grad-gray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="440" fill="#0f172a" rx="14"/>

  <!-- ZONE: Top Metric Impact -->
  <rect x="40" y="8" width="1120" height="76" rx="12"
        fill="#4A90D9" fill-opacity="0.03"
        stroke="#4A90D9" stroke-opacity="0.12" stroke-width="1.5" stroke-dasharray="7 4"/>
  <text x="600" y="26" text-anchor="middle"
        fill="#4A90D9" fill-opacity="0.55" font-size="10" font-weight="700"
        letter-spacing="0.12em">TOP METRIC IMPACT</text>

  <!-- === EDGES === -->

  <!-- SIZE to L2 -->
  <path d="M 180,72 C 180,100 497,100 497,130" fill="none"
        stroke="#2DD4BF" stroke-width="1.5" opacity="0.55"/>
  <!-- BRG to L2 -->
  <path d="M 920,72 C 920,100 623,100 623,130" fill="none"
        stroke="#FB923C" stroke-width="1.5" opacity="0.55"/>

  <!-- L2 to f_invite -->
  <path d="M 497,182 C 497,204 340,204 340,230" fill="none"
        stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.8"/>
  <!-- L2 to c_invite -->
  <path d="M 623,182 C 623,204 780,204 780,230" fill="none"
        stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.8"/>

  <!-- f to base_f -->
  <path d="M 340,278 L 340,340" fill="none"
        stroke="#64748b" stroke-width="1.3" marker-end="url(#arrow-gray)" opacity="0.55"/>
  <!-- c to base_c -->
  <path d="M 780,278 L 780,340" fill="none"
        stroke="#64748b" stroke-width="1.3" marker-end="url(#arrow-gray)" opacity="0.55"/>

  <!-- === NODES === -->

  <!-- Helix Size: UP (connected) -->
  <g filter="url(#glow-teal)">
    <rect x="80" y="32" width="200" height="40" rx="10"
          fill="url(#grad-teal)" stroke="#2DD4BF" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="180" y="57" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Helix Size: <tspan fill="#2DD4BF" font-weight="700">UP</tspan></text>
  </g>

  <!-- HS Value Realisation: neutral (not connected, gray) -->
  <g filter="url(#glow-gray)">
    <rect x="300" y="32" width="230" height="40" rx="10"
          fill="url(#grad-gray)" stroke="#94a3b8" stroke-opacity="0.3" stroke-width="1"/>
    <text x="415" y="57" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">HS Value Realisation: --</text>
  </g>

  <!-- PS Value Realisation: neutral (not connected, gray) -->
  <g filter="url(#glow-gray)">
    <rect x="540" y="32" width="250" height="40" rx="10"
          fill="url(#grad-gray)" stroke="#94a3b8" stroke-opacity="0.3" stroke-width="1"/>
    <text x="665" y="57" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">PS Value Realisation: --</text>
  </g>

  <!-- Bridging: DOWN (connected) -->
  <g filter="url(#glow-orange)">
    <rect x="820" y="32" width="200" height="40" rx="10"
          fill="url(#grad-orange)" stroke="#FB923C" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="920" y="57" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Bridging: <tspan fill="#FB923C" font-weight="700">DOWN</tspan></text>
  </g>

  <!-- L2: Team Invite -->
  <g filter="url(#glow-blue)">
    <rect x="370" y="130" width="380" height="52" rx="10"
          fill="url(#grad-blue)" stroke="#4A90D9" stroke-opacity="0.55" stroke-width="1.5"/>
    <text x="560" y="155" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">L2: Team Invite</text>
    <text x="560" y="173" text-anchor="middle" fill="#cbd5e1" font-size="10">Throughput = f_invite x c_invite (i=1)</text>
  </g>

  <!-- f_invite -->
  <g filter="url(#glow-teal)">
    <rect x="215" y="230" width="250" height="48" rx="10"
          fill="url(#grad-teal)" stroke="#2DD4BF" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="340" y="252" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">f_invite</text>
    <text x="340" y="268" text-anchor="middle" fill="#cbd5e1" font-size="10">Trigger frequency</text>
  </g>

  <!-- c_invite (i=1) -->
  <g filter="url(#glow-teal)">
    <rect x="655" y="230" width="250" height="48" rx="10"
          fill="url(#grad-teal)" stroke="#2DD4BF" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="780" y="252" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">c_invite</text>
    <text x="780" y="268" text-anchor="middle" fill="#cbd5e1" font-size="10">Conversion (i = 1)</text>
  </g>

  <!-- Base metrics: under f_invite -->
  <g filter="url(#glow-gray)">
    <rect x="215" y="340" width="250" height="52" rx="10"
          fill="url(#grad-gray)" stroke="#94a3b8" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="245" cy="360" r="2.5" fill="#94a3b8" fill-opacity="0.6"/>
    <text x="257" y="364" fill="#cbd5e1" font-size="10" font-weight="500">Invite events</text>
    <circle cx="245" cy="380" r="2.5" fill="#94a3b8" fill-opacity="0.6"/>
    <text x="257" y="384" fill="#94a3b8" font-size="10">U_h count</text>
  </g>

  <!-- Base metrics: under c_invite -->
  <g filter="url(#glow-gray)">
    <rect x="655" y="340" width="250" height="68" rx="10"
          fill="url(#grad-gray)" stroke="#94a3b8" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="685" cy="358" r="2.5" fill="#94a3b8" fill-opacity="0.6"/>
    <text x="697" y="362" fill="#cbd5e1" font-size="10" font-weight="500">Invites opened</text>
    <circle cx="685" cy="378" r="2.5" fill="#94a3b8" fill-opacity="0.6"/>
    <text x="697" y="382" fill="#94a3b8" font-size="10">Invites sent</text>
    <circle cx="685" cy="398" r="2.5" fill="#94a3b8" fill-opacity="0.6"/>
    <text x="697" y="402" fill="#94a3b8" font-size="10">Invites accepted</text>
  </g>

</svg>
