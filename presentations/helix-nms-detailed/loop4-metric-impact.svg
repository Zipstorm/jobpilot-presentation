<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440"
     font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="glow-teal" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#2DD4BF" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#4A90D9" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-orange" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#FB923C" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-gray" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#94a3b8" flood-opacity="0.2" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#A78BFA" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-blue" viewBox="0 0 10 7" refX="9" refY="3.5"
            markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#4A90D9"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 7" refX="9" refY="3.5"
            markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#64748b"/>
    </marker>
    <linearGradient id="grad-teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="grad-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4A90D9" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="grad-orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FB923C" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="grad-gray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="grad-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.07"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="440" fill="#0f172a" rx="14"/>

  <!-- ZONE: Top Metric Impact -->
  <rect x="40" y="8" width="1120" height="76" rx="12"
        fill="#4A90D9" fill-opacity="0.03"
        stroke="#4A90D9" stroke-opacity="0.12" stroke-width="1.5" stroke-dasharray="7 4"/>
  <text x="600" y="26" text-anchor="middle"
        fill="#4A90D9" fill-opacity="0.55" font-size="10" font-weight="700"
        letter-spacing="0.12em">TOP METRIC IMPACT</text>

  <!-- === EDGES === -->

  <!-- SIZE to L4 -->
  <path d="M 180,72 C 180,100 446,100 446,130" fill="none"
        stroke="#2DD4BF" stroke-width="1.5" opacity="0.55"/>
  <!-- LIQ to L4 -->
  <path d="M 415,72 C 415,100 522,100 522,130" fill="none"
        stroke="#4A90D9" stroke-width="1.5" opacity="0.55"/>
  <!-- ACT to L4 -->
  <path d="M 660,72 C 660,100 598,100 598,130" fill="none"
        stroke="#4A90D9" stroke-width="1.5" opacity="0.55"/>
  <!-- BRG to L4 -->
  <path d="M 920,72 C 920,100 674,100 674,130" fill="none"
        stroke="#2DD4BF" stroke-width="1.5" opacity="0.55"/>

  <!-- L4 to Bridge Rate -->
  <path d="M 465,182 C 465,208 230,208 230,234" fill="none"
        stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.8"/>
  <!-- L4 to Time to Bridge -->
  <path d="M 560,182 L 560,234" fill="none"
        stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.8"/>
  <!-- L4 to Two directions -->
  <path d="M 655,182 C 655,208 920,208 920,234" fill="none"
        stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.8"/>

  <!-- Bridge Rate to base -->
  <path d="M 230,282 L 230,340" fill="none"
        stroke="#64748b" stroke-width="1.3" marker-end="url(#arrow-gray)" opacity="0.55"/>
  <!-- Time to Bridge to base -->
  <path d="M 560,282 L 560,340" fill="none"
        stroke="#64748b" stroke-width="1.3" marker-end="url(#arrow-gray)" opacity="0.55"/>
  <!-- Two directions to base -->
  <path d="M 920,282 L 920,340" fill="none"
        stroke="#64748b" stroke-width="1.3" marker-end="url(#arrow-gray)" opacity="0.55"/>

  <!-- === NODES === -->

  <!-- Helix Size: UP -->
  <g filter="url(#glow-teal)">
    <rect x="80" y="32" width="200" height="40" rx="10"
          fill="url(#grad-teal)" stroke="#2DD4BF" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="180" y="57" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Helix Size: <tspan fill="#2DD4BF" font-weight="700">UP</tspan></text>
  </g>

  <!-- HS Value Realisation: mixed -->
  <g filter="url(#glow-blue)">
    <rect x="300" y="32" width="230" height="40" rx="10"
          fill="url(#grad-blue)" stroke="#4A90D9" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="415" y="57" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">HS Value Realisation: <tspan fill="#4A90D9" font-weight="700">mixed</tspan></text>
  </g>

  <!-- PS Value Realisation: mixed -->
  <g filter="url(#glow-blue)">
    <rect x="540" y="32" width="250" height="40" rx="10"
          fill="url(#grad-blue)" stroke="#4A90D9" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="665" y="57" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">PS Value Realisation: <tspan fill="#4A90D9" font-weight="700">mixed</tspan></text>
  </g>

  <!-- Bridging: UP (only loop) -->
  <g filter="url(#glow-teal)">
    <rect x="800" y="32" width="240" height="40" rx="10"
          fill="url(#grad-teal)" stroke="#2DD4BF" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="920" y="57" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Bridging: <tspan fill="#2DD4BF" font-weight="700">UP (only loop)</tspan></text>
  </g>

  <!-- L4: Cross-Persona Bridge -->
  <g filter="url(#glow-blue)">
    <rect x="370" y="130" width="380" height="52" rx="10"
          fill="url(#grad-blue)" stroke="#4A90D9" stroke-opacity="0.55" stroke-width="1.5"/>
    <text x="560" y="155" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">L4: Cross-Persona Bridge</text>
    <text x="560" y="173" text-anchor="middle" fill="#cbd5e1" font-size="10">No i/c/f -- conversion rate only</text>
  </g>

  <!-- Bridge Rate -->
  <g filter="url(#glow-teal)">
    <rect x="100" y="234" width="260" height="48" rx="10"
          fill="url(#grad-teal)" stroke="#2DD4BF" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="230" y="256" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Bridge Rate</text>
    <text x="230" y="272" text-anchor="middle" fill="#cbd5e1" font-size="10">D_new / U_single</text>
  </g>

  <!-- Time to Bridge -->
  <g filter="url(#glow-teal)">
    <rect x="430" y="234" width="260" height="48" rx="10"
          fill="url(#grad-teal)" stroke="#2DD4BF" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="560" y="256" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Time to Bridge</text>
    <text x="560" y="272" text-anchor="middle" fill="#cbd5e1" font-size="10">Median latency</text>
  </g>

  <!-- Two directions -->
  <g filter="url(#glow-purple)">
    <rect x="770" y="234" width="300" height="48" rx="10"
          fill="url(#grad-purple)" stroke="#A78BFA" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="920" y="256" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Two directions</text>
    <text x="920" y="272" text-anchor="middle" fill="#cbd5e1" font-size="10">P-to-H and H-to-P</text>
  </g>

  <!-- Base: under Bridge Rate -->
  <g filter="url(#glow-gray)">
    <rect x="85" y="340" width="290" height="68" rx="10"
          fill="url(#grad-gray)" stroke="#94a3b8" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="115" cy="358" r="2.5" fill="#94a3b8" fill-opacity="0.6"/>
    <text x="127" y="362" fill="#cbd5e1" font-size="10" font-weight="500">Surface Activated events</text>
    <circle cx="115" cy="378" r="2.5" fill="#94a3b8" fill-opacity="0.6"/>
    <text x="127" y="382" fill="#94a3b8" font-size="10">Total users U</text>
    <circle cx="115" cy="398" r="2.5" fill="#94a3b8" fill-opacity="0.6"/>
    <text x="127" y="402" fill="#94a3b8" font-size="10">Dual-persona users D</text>
  </g>

  <!-- Base: under Time to Bridge -->
  <g filter="url(#glow-gray)">
    <rect x="415" y="340" width="290" height="52" rx="10"
          fill="url(#grad-gray)" stroke="#94a3b8" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="445" cy="360" r="2.5" fill="#94a3b8" fill-opacity="0.6"/>
    <text x="457" y="364" fill="#cbd5e1" font-size="10" font-weight="500">Account creation timestamp</text>
    <circle cx="445" cy="380" r="2.5" fill="#94a3b8" fill-opacity="0.6"/>
    <text x="457" y="384" fill="#94a3b8" font-size="10">Second surface activation timestamp</text>
  </g>

  <!-- Base: under Two directions -->
  <g filter="url(#glow-gray)">
    <rect x="750" y="340" width="340" height="52" rx="10"
          fill="url(#grad-gray)" stroke="#94a3b8" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="780" cy="360" r="2.5" fill="#94a3b8" fill-opacity="0.6"/>
    <text x="792" y="364" fill="#cbd5e1" font-size="10" font-weight="500">P-to-H: Prospect creates job</text>
    <circle cx="780" cy="380" r="2.5" fill="#94a3b8" fill-opacity="0.6"/>
    <text x="792" y="384" fill="#94a3b8" font-size="10">H-to-P: Hiring user creates CL or EOI</text>
  </g>

</svg>
