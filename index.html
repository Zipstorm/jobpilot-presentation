<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentations</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
  <style>
    :root {
      --seekout-blue: #4A90D9;
      --seekout-teal: #2DD4BF;
      --accent-purple: #A78BFA;
      --accent-orange: #FB923C;
      --bg-dark: #0f172a;
      --bg-surface: #1e293b;
      --bg-card: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.08);
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .header {
      padding: 60px 40px 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #f1f5f9, var(--seekout-teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      color: var(--text-muted);
      font-size: 1.05rem;
      margin-top: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 24px;
      padding: 0 40px 60px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      border-color: rgba(45, 212, 191, 0.4);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .tag {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(45, 212, 191, 0.12);
      color: var(--seekout-teal);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .card h2 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .card .description {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.5;
      flex: 1;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .card-arrow {
      color: var(--seekout-teal);
      font-size: 1.2rem;
      transition: transform 0.2s;
    }

    .card:hover .card-arrow {
      transform: translateX(4px);
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    @media (max-width: 480px) {
      .header { padding: 40px 20px 24px; }
      .header h1 { font-size: 1.8rem; }
      .grid { grid-template-columns: 1fr; padding: 0 20px 40px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Presentations</h1>
    <p>Select a presentation to view</p>
  </div>
  <div class="grid" id="grid"></div>

  <script>
    // ── Presentation Registry ──────────────────────────────────────────
    // Add new presentations here. Each entry renders as a card on this page.
    const presentations = [
      {
        slug: 'jobpilot',
        title: 'Job Application Extension',
        description: 'Turning job applications into a jobseeker acquisition engine for Helix',
        date: '2026-02-26',
        authors: 'Akshay Gupta & Kailash Yogeshwar',
        tags: ['Hackathon', 'Chrome Extension', 'AI'],
      },
    ];
    // ── End Registry ───────────────────────────────────────────────────

    const grid = document.getElementById('grid');

    if (presentations.length === 0) {
      grid.innerHTML = '<div class="empty-state"><p>No presentations yet.</p></div>';
    } else {
      presentations.forEach(p => {
        const card = document.createElement('a');
        card.className = 'card';
        card.href = `presentations/${p.slug}/index.html`;

        const tagsHtml = (p.tags || [])
          .map(t => `<span class="tag">${t}</span>`)
          .join('');

        const dateStr = p.date
          ? new Date(p.date + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })
          : '';

        card.innerHTML = `
          ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
          <h2>${p.title}</h2>
          <p class="description">${p.description}</p>
          <div class="card-meta">
            <span>${p.authors || ''}${dateStr ? ` &middot; ${dateStr}` : ''}</span>
            <span class="card-arrow">&rarr;</span>
          </div>
        `;
        grid.appendChild(card);
      });
    }
  </script>
</body>
</html>
